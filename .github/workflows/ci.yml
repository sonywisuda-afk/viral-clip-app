name: CI (all)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Build packages/shared
        run: pnpm --filter @viral-clip-app/shared build

      - name: Build packages/database
        run: pnpm --filter @viral-clip-app/database build

      - name: Build packages/storage
        run: pnpm --filter @viral-clip-app/storage build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test packages/shared
        run: pnpm --filter @viral-clip-app/shared test

      - name: Test packages/storage
        run: pnpm --filter @viral-clip-app/storage test

      - name: Build
        run: pnpm build

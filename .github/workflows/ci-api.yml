name: CI (api)

on:
  push:
    branches: [master]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'packages/database/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-api.yml'
  pull_request:
    branches: [master]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'packages/database/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-api.yml'

jobs:
  build:
    name: api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages/shared
        run: pnpm --filter @viral-clip-app/shared build

      - name: Build packages/database
        run: pnpm --filter @viral-clip-app/database build

      - name: Lint
        run: pnpm --filter @viral-clip-app/api lint

      - name: Typecheck
        run: pnpm --filter @viral-clip-app/api typecheck

      - name: Build
        run: pnpm --filter @viral-clip-app/api build

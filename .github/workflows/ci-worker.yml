name: CI (worker)

on:
  push:
    branches: [master]
    paths:
      - 'apps/worker/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-worker.yml'
  pull_request:
    branches: [master]
    paths:
      - 'apps/worker/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-worker.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages/shared
        run: pnpm --filter @viral-clip-app/shared build

      - name: Lint
        run: pnpm --filter @viral-clip-app/worker lint

      - name: Typecheck
        run: pnpm --filter @viral-clip-app/worker typecheck

      - name: Build
        run: pnpm --filter @viral-clip-app/worker build

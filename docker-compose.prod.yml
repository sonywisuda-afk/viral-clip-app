# Reference deployment stack - builds and runs apps/api, apps/worker, and
# apps/web from their Dockerfiles alongside Postgres and Redis, wired
# together over the compose network. Not used for local dev (see
# docker-compose.yml / `pnpm dev` for that) - this is what "the whole thing
# actually running as containers" looks like, and a starting point for
# adapting to a real host/orchestrator.
#
#   docker compose -f docker-compose.prod.yml up --build
#
# Secrets (JWT_SECRET, GROQ_API_KEY, OPENAI_API_KEY, MIDTRANS_*, etc.) come
# from .env via env_file. STORAGE_* is the one exception - .env's copy
# points at the local-dev-only MinIO container (see docker-compose.yml),
# which doesn't exist in this prod stack, so .env.production is layered on
# top (later env_file entries win on shared keys) to swap in real R2
# credentials for just that one concern. See .env.production.example.
# DATABASE_URL/REDIS_URL/FFMPEG_PATH are overridden below to point at the
# compose network's service names/the container's own ffmpeg instead of
# whatever apps/api and apps/worker's own .env values are for local dev
# (localhost, and a host-specific FFMPEG_PATH).
#
# Explicit project name - without it, compose derives the project name from
# the directory (same as docker-compose.yml's default), and since both files
# use the service names `postgres`/`redis`, running this alongside the dev
# stack would make compose treat them as the same containers and `down`
# this file would tear down your dev Postgres/Redis too.
name: speedora-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-viralclip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viralclip}
      POSTGRES_DB: ${POSTGRES_DB:-viralclip}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-viralclip}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job, not a long-running service - runs `prisma migrate deploy`
  # against a fresh database before api/worker start. Without this, a brand
  # new Postgres volume has no schema and the very first request that
  # touches the DB fails with "table does not exist".
  migrate:
    build:
      context: .
      dockerfile: packages/database/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-viralclip}:${POSTGRES_PASSWORD:-viralclip}@postgres:5432/${POSTGRES_DB:-viralclip}

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-viralclip}:${POSTGRES_PASSWORD:-viralclip}@postgres:5432/${POSTGRES_DB:-viralclip}
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: http://localhost:3000
    ports:
      - '${API_PORT:-3001}:3001'
    # Sized generously above normal usage (NestJS + a handful of concurrent
    # HTTP requests) but well below what caused a real OOM under load - a
    # container that leaks/spikes past this gets killed and restarted
    # (restart: unless-stopped) rather than taking down the whole host.
    deploy:
      resources:
        limits:
          memory: 1g

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-viralclip}:${POSTGRES_PASSWORD:-viralclip}@postgres:5432/${POSTGRES_DB:-viralclip}
      REDIS_URL: redis://redis:6379
      # Overrides whatever host-specific FFMPEG_PATH is in .env for local
      # dev - the image already has a real ffmpeg on PATH (see
      # apps/worker/Dockerfile).
      FFMPEG_PATH: ffmpeg
    # By far the heaviest process in this stack - FFmpeg encodes plus
    # concurrent Python/MediaPipe subprocesses (bounded by
    # subprocessLimiter.ts's MAX_CONCURRENT_SUBPROCESSES, but each one can
    # still be memory-hungry on its own) are exactly what exhausted host
    # memory during a real incident. This limit turns that into a contained,
    # restarted container instead of a host-wide OOM taking down Postgres/
    # Redis/api alongside it.
    deploy:
      resources:
        limits:
          memory: 4g

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${NEXT_PUBLIC_MIDTRANS_CLIENT_KEY:-}
        NEXT_PUBLIC_MIDTRANS_IS_PRODUCTION: ${NEXT_PUBLIC_MIDTRANS_IS_PRODUCTION:-false}
    restart: unless-stopped
    depends_on:
      # Every other depends_on in this file gates on condition: service_healthy
      # (postgres/redis/migrate above) - this one used to be the plain short
      # form (no condition), which only waits for the container to START, not
      # for api to actually be able to serve requests. api's own Dockerfile
      # HEALTHCHECK (hitting /health/live) is what this condition reads.
      api:
        condition: service_healthy
    ports:
      - '3000:3000'
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres-data:
  redis-data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-viralclip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viralclip}
      POSTGRES_DB: ${POSTGRES_DB:-viralclip}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-viralclip}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Local S3-compatible object storage for development. Added because the
  # dev machine's ISP intermittently blackholes Cloudflare R2's IP range
  # (TCP to the STORAGE_ENDPOINT times out for long stretches), which made
  # every upload/preview/download randomly fail. Point STORAGE_ENDPOINT at
  # http://localhost:9000 to use this; production keeps using R2.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot bucket bootstrap so a fresh `docker compose up` needs no manual
  # console step before the app can store objects.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/$${STORAGE_BUCKET:-speedora}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-speedora}

  # Same backup scheduler as docker-compose.prod.yml (see ops/backup,
  # docs/backup-restore.md), gated behind a compose profile so a plain
  # `docker compose up` in dev doesn't start it unconditionally - dev data
  # doesn't need real backups, but the scripts are worth being able to
  # exercise locally: `docker compose --profile backup up backup`.
  backup:
    profiles: ['backup']
    build:
      context: ./ops/backup
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-viralclip}:${POSTGRES_PASSWORD:-viralclip}@postgres:5432/${POSTGRES_DB:-viralclip}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: auto
      STORAGE_BUCKET: ${STORAGE_BUCKET:-speedora}
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_FORCE_PATH_STYLE: 'true'
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - backup-data:/backups
      - backup-status:/status

volumes:
  postgres-data:
  redis-data:
  minio-data:
  backup-data:
  backup-status:
